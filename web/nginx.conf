server {
  listen 80;
  server_name _;

  # Subir logo/foto en base64 puede superar el limite por defecto (1m).
  client_max_body_size 12m;

  # Llamadas al backend: MISMO origen -> sin CORS. nginx las rutea al api.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # PWA: forzar el MIME correcto del manifest (algunos navegadores lo exigen).
  location = /manifest.webmanifest {
    root /usr/share/nginx/html;
    types { }
    default_type application/manifest+json;
  }

  # PWA: el service worker no debe cachearse, asi los cambios se propagan.
  location = /sw.js {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    types { }
    default_type application/javascript;
  }

  # SPA: cualquier ruta desconocida devuelve index.html.
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
